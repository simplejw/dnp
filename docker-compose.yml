web_nginx:
  build: ./nginx
  ports:
    - "8888:80"
  volumes:
    # source
    - ./www/:/usr/share/nginx/html/
    - ./conf/www.conf:/etc/nginx/conf.d/default.conf:ro
  links:
    - web_php72_fpm

web_php72_fpm:
  build: ./php72-fpm
  expose:
    - "9000"
  volumes:
    - ./www/:/usr/share/nginx/html/

