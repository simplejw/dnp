version: '3'
services:  
  web_nginx:
    build: ./nginx
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      # source
      - ./www/:/usr/share/nginx/html/
      - ./nginx/www.conf:/etc/nginx/conf.d/default.conf:ro
    # links:
    #   - web_php72_fpm
    networks:
        - net-php72-fpm

  web_php72_fpm:
    build: ./php72-fpm
    expose:
      - "9000"
    volumes:
      - ./www/:/usr/share/nginx/html/
    # links:
    #   - web_redis
    networks:
        - net-php72-fpm
        - net-redis

  web_redis:
    build: ./redis
    ports:
      - "6379:6379"
    networks:
        - net-redis

networks:
  net-php72-fpm:
  net-redis: